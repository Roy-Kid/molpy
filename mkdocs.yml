site_name: molpy
site_url: https://molcrafts.github.io/molpy
repo_url: https://github.com/MolCrafts/molpy
repo_name: MolCrafts/molpy
site_description: Modern Python framework for molecular simulation and analysis.

copyright: Copyright © 2024 - 2025 MolCrafts Team

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: indigo
    - scheme: slate
      primary: teal
      accent: indigo
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - content.code.annotate
  favicon: assets/favicon.ico
  logo: assets/logo.png

markdown_extensions:
  - admonition
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - codehilite

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            separate_signature: true
            heading_level: 2
            merge_init_into_class: true
            filters: ["!^_"]

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
      - FAQ: getting-started/faq.md
  - Tutorials:
      - Block & Frame Basics: tutorials/block-frame.md
      - Force Field Basics: tutorials/forcefield.md
      - Topology Management: tutorials/topology.md
      - System Organization: tutorials/system-organization.md
      - Selection & Filtering: tutorials/selection.md
      - Box & Simulation Boundaries: tutorials/box.md
      - Element & Chemistry: tutorials/element.md
      - Trajectory Analysis: tutorials/trajectory.md
      - Region & Geometric Operations: tutorials/region.md
      - Atomistic Structures: tutorials/atomistic.md

  - How-to Guides:
      - IO Workflows: how-to/io-workflows.md
      - Molecular Building: how-to/molecular-building.md
      - Potential Calculations: how-to/potential-calculations.md
      - Molecular Packing: how-to/molecular-packing.md
  - Developer Guides:
      - Custom Wrappers: developer/custom-wrappers.md
      - Custom Selection Predicates: developer/custom-selections.md
      - Custom I/O: developer/custom-io.md
  - API Reference:
      - Index: reference/index.md
      - Core:
          - Overview: reference/core/index.md
          - Atomistic: reference/core/atomistic.md
          - Frame: reference/core/frame.md
          - Trajectory: reference/core/trajectory.md
          - Box: reference/core/box.md
          - System: reference/core/system.md
          - Topology: reference/core/topology.md
          - Selection: reference/core/selection.md
          - ForceField: reference/core/forcefield.md
          - Element: reference/core/element.md
          - Wrapper: reference/core/wrapper.md
          - Units: reference/core/units.md
          - Config: reference/core/config.md
          - Utils: reference/core/utils.md
      - I/O:
          - Overview: reference/io/index.md
          - Data Formats: reference/io/data.md
          - Force Field Files: reference/io/forcefield.md
          - Trajectory Files: reference/io/trajectory.md
          - Utils: reference/io/utils.md
      - Analysis:
          - Overview: reference/analysis/index.md
          - Base: reference/analysis/base.md
          - Density: reference/analysis/density.md
          - Diffusion: reference/analysis/diffusion.md
          - Clustering: reference/analysis/cluster.md
          - Locality: reference/analysis/locality.md
      - Builder:
          - Overview: reference/builder/index.md
          - Base: reference/builder/base.md
          - Polymer: reference/builder/polymer.md
          - PolyBuilder: reference/builder/polybuilder.md
          - Bulk: reference/builder/bulk.md
          - AmberTools: reference/builder/ambertools.md
          - Reacter LAMMPS: reference/builder/reacter_lammps.md
      - Operations:
          - Overview: reference/op/index.md
          - Geometry: reference/op/geometry.md
      - Potential:
          - Overview: reference/potential/index.md
          - Base: reference/potential/base.md
          - Bond: reference/potential/bond.md
          - Angle: reference/potential/angle.md
          - Pair: reference/potential/pair.md
      - Packing:
          - Overview: reference/pack/index.md
          - Session: reference/pack/session.md
          - Target: reference/pack/target.md
          - Constraint: reference/pack/constraint.md
          - Packer: reference/pack/packer.md
          - Optimizer: reference/pack/optimizer.md
      - Typifier:
