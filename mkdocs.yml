          - Geometry: reference/op/geometry.md
      - Potential:
          - Overview: reference/potential/index.md
          - Base: reference/potential/base.md
          - Bond:
              - Base: reference/potential/bond/base.md
              - Harmonic: reference/potential/bond/harmonic.md
          - Angle:
              - Base: reference/potential/angle/base.md
              - Harmonic: reference/potential/angle/harmonic.md
          - Pair:
              - Base: reference/potential/pair/base.md
              - Lennard-Jones: reference/potential/pair/lj.md
              - Coulomb: reference/potential/pair/coul.md
      - Packing:
