site_name: molpy
site_url: https://molcrafts.github.io/molpy
repo_url: https://github.com/MolCrafts/molpy
repo_name: MolCrafts/molpy
site_description: Modern Python framework for molecular simulation and analysis.

copyright: Copyright © 2024 - 2025 MolCrafts Team

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: indigo
    - scheme: slate
      primary: teal
      accent: indigo
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - content.code.annotate
  favicon: assets/favicon.ico
  logo: assets/logo.png

markdown_extensions:
  - admonition
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - codehilite

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            separate_signature: true
            heading_level: 2
            merge_init_into_class: true
            filters: ["!^_"]
  - mkdocs-jupyter

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
      - FAQ: getting-started/faq.md
  - Tutorials:
      - Block & Frame Basics: tutorials/block-frame.md
      - Force Field Basics: tutorials/forcefield.md
      - Topology Management: tutorials/topology.md
      - System Organization: tutorials/system-organization.md
      - Selection & Filtering: tutorials/selection.md
      - Box & Simulation Boundaries: tutorials/box.md
      - Element & Chemistry: tutorials/element.md
      - Trajectory Analysis: tutorials/trajectory.md
      - Region & Geometric Operations: tutorials/region.md
      - Atomistic Structures: tutorials/atomistic.md
  - How-to Guides:
      - Molecular Modeling: how-to/programming-modeling.ipynb
      - Molecular Packing: how-to/packmol.md
      - Call Externals: how-to/ambertools.md
  - Developer Guides:
      - Custom Selection Predicates: developer/custom-selections.md
      - Custom I/O: developer/custom-io.md
      - Plugin Development: developer/plugin-development.md
  - API Reference:
      - Index: reference/index.md
      - Core:
          - Overview: reference/core/index.md
          - Atomistic: reference/core/atomistic.md
          - Frame: reference/core/frame.md
          - Trajectory: reference/core/trajectory.md
          - Box: reference/core/box.md
          - System: reference/core/system.md
          - Topology: reference/core/topology.md
          - Selection: reference/core/selection.md
          - ForceField: reference/core/forcefield.md
          - Element: reference/core/element.md
          - Wrapper: reference/core/wrapper.md
          - Region: reference/core/region.md
          - Protocol: reference/core/protocol.md
          - Logger: reference/core/logger.md
          - Units: reference/core/units.md
          - Config: reference/core/config.md
          - Utils: reference/core/utils.md
      - I/O:
          - Overview: reference/io/index.md
          - Data Formats:
              - PDB: reference/io/data/pdb.md
              - XYZ: reference/io/data/xyz.md
              - LAMMPS: reference/io/data/lammps.md
              - AMBER: reference/io/data/amber.md
              - GROMACS: reference/io/data/gro.md
              - MOL2: reference/io/data/mol2.md
              - XSF: reference/io/data/xsf.md
          - Force Field Files:
              - LAMMPS: reference/io/forcefield/lammps.md
              - AMBER: reference/io/forcefield/amber.md
              - GROMACS: reference/io/forcefield/top.md
              - XML: reference/io/forcefield/xml.md
          - Trajectory Files:
              - LAMMPS: reference/io/trajectory/lammps.md
              - XYZ: reference/io/trajectory/xyz.md
          - Utils: reference/io/utils.md
      - Analysis:
          - Overview: reference/analysis/index.md
          - Base: reference/analysis/base.md
          - Density:
              - RDF: reference/analysis/density/rdf.md
          - Diffusion:
              - MSD: reference/analysis/diffusion/msd.md
          - Clustering:
              - Chain: reference/analysis/cluster/chain.md
          - Locality:
              - Neighbor List: reference/analysis/locality/neighborlist.md
      - Builder:
          - Overview: reference/builder/index.md
          - Base: reference/builder/base.md
          - Polymer: reference/builder/polymer.md
          - PolyBuilder: reference/builder/polybuilder.md
          - Bulk: reference/builder/bulk.md
          - Presets: reference/builder/presets.md
          - AmberTools: reference/builder/ambertools.md
          - Reacter LAMMPS: reference/builder/reacter_lammps.md
      - Operations:
